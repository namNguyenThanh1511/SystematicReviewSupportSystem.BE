name: Build image and deploy to k8s

on:
   push:
      branches: ["main"]

jobs:
   build-and-push:
      runs-on: ubuntu-latest
      permissions:
         contents: read
         packages: write

      steps:
         - uses: actions/checkout@v5

         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3

         - name: Log in to GitHub Container Registry
           uses: docker/login-action@v3
           with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: Extract metadata
           id: meta
           uses: docker/metadata-action@v5
           with:
              images: ghcr.io/${{ github.repository_owner }}/srss-be-api
              tags: |
                 type=raw,value=latest,enable={{is_default_branch}}
                 type=sha

         - name: Build and push Docker image
           uses: docker/build-push-action@v5
           with:
              context: ./
              file: ./SRSS.IAM/SRSS.IAM.API/Dockerfile
              push: true
              tags: ${{ steps.meta.outputs.tags }}

   deploy-to-k8s:
      needs: build-and-push
      runs-on: [self-hosted, kubernetes-hosting]
      timeout-minutes: 10
      steps:
         - name: Checkout code
           uses: actions/checkout@v5

         - name: Set image SHA tag in deployment manifest
           run: |
              SHA_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
              sed -i "s|image: ghcr.io/${{ github.repository_owner }}/srss-be-api:.*|image: ghcr.io/${{ github.repository_owner }}/srss-be-api:${SHA_TAG}|" SRSS.IAM/SRSS.IAM.API/manifest/deployment.yaml

         - name: Apply manifests
           run: |
              kubectl apply -f SRSS.IAM/SRSS.IAM.API/manifest/deployment.yaml
